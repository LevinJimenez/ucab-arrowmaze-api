name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: arrowmaze_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run Prisma Generate
        run: pnpm exec prisma generate

      - name: Run Prisma DB Push (Test DB Setup)
        run: pnpm exec prisma db push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/arrowmaze_test
          DIRECT_URL: postgresql://test:test@localhost:5432/arrowmaze_test

      - name: Run unit tests with coverage (no DB — fast feedback)
        run: pnpm run test:coverage

      - name: Run integration tests (Postgres)
        run: pnpm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/arrowmaze_test
          DIRECT_URL: postgresql://test:test@localhost:5432/arrowmaze_test
          JWT_SECRET: ci-test-secret-key-minimum-16-chars
          NODE_ENV: test

      - name: Build
        run: pnpm run build
