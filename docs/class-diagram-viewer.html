<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Arrow Maze — Diagrama de clases</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 13px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    background: #f4f4f5; color: #18181b;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #18181b; color: #e4e4e7; }
    .bar { background: #27272a; border-bottom-color: #3f3f46; }
    button { background: #3f3f46; color: #e4e4e7; border-color: #52525b; }
    button:hover { background: #52525b; }
    #stage { background: #09090b; }
  }
  .bar {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: #fff; border-bottom: 1px solid #d4d4d8; flex: none;
  }
  button {
    font: inherit; padding: 4px 10px; border: 1px solid #d4d4d8;
    border-radius: 6px; background: #fafafa; cursor: pointer;
  }
  button:hover { background: #f4f4f5; }
  #pct { min-width: 62px; text-align: right; font-variant-numeric: tabular-nums; }
  .hint { opacity: .6; margin-left: auto; }
  #stage { flex: 1; overflow: auto; background: #fff; cursor: grab; }
  #stage.dragging { cursor: grabbing; }
  #img { display: block; }
</style>
</head>
<body>
  <div class="bar">
    <button id="out">−</button>
    <span id="pct">—</span>
    <button id="in">+</button>
    <button id="fit">Ajustar</button>
    <button id="one">100%</button>
    <span class="hint">Rueda = zoom · arrastrar = mover</span>
  </div>
  <div id="stage"><img id="img" src="class-diagram.svg" alt="Diagrama de clases"></div>

<script>
// El SVG mide 15273x15541. Se hace zoom fijando el ANCHO del <img> en píxeles,
// no con transform: scale(): así el navegador RE-RENDERIZA el vector a esa
// resolución y el texto queda nítido a cualquier aumento (transform reescalaría
// el bitmap ya cacheado y se vería borroso).
// Dimensiones del viewBox del SVG. Si re-renderizas el diagrama y cambian,
// actualiza estos dos numeros (los da: grep -o 'width="[0-9]*" height="[0-9]*"' class-diagram.svg).
const NATURAL_W = 15820, NATURAL_H = 13679;
const MIN = 0.02, MAX = 8;
const stage = document.getElementById('stage');
const img = document.getElementById('img');
const pct = document.getElementById('pct');
let scale = 1;

function apply(next, anchorX, anchorY) {
  next = Math.min(MAX, Math.max(MIN, next));
  // Punto del diagrama bajo el cursor, para no perderlo al ampliar.
  const ax = anchorX ?? stage.clientWidth / 2;
  const ay = anchorY ?? stage.clientHeight / 2;
  const dx = (stage.scrollLeft + ax) / scale;
  const dy = (stage.scrollTop + ay) / scale;

  scale = next;
  img.style.width = (NATURAL_W * scale) + 'px';
  img.style.height = (NATURAL_H * scale) + 'px';
  pct.textContent = (scale * 100).toFixed(scale < 0.1 ? 1 : 0) + '%';

  stage.scrollLeft = dx * scale - ax;
  stage.scrollTop = dy * scale - ay;
}

const fit = () => apply(Math.min(stage.clientWidth / NATURAL_W, stage.clientHeight / NATURAL_H));

document.getElementById('in').onclick = () => apply(scale * 1.3);
document.getElementById('out').onclick = () => apply(scale / 1.3);
document.getElementById('one').onclick = () => apply(1);
document.getElementById('fit').onclick = fit;

stage.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = stage.getBoundingClientRect();
  apply(scale * (e.deltaY < 0 ? 1.15 : 1 / 1.15), e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

let drag = null;
stage.addEventListener('pointerdown', (e) => {
  drag = { x: e.clientX, y: e.clientY, l: stage.scrollLeft, t: stage.scrollTop };
  stage.setPointerCapture(e.pointerId);
  stage.classList.add('dragging');
});
stage.addEventListener('pointermove', (e) => {
  if (!drag) return;
  stage.scrollLeft = drag.l - (e.clientX - drag.x);
  stage.scrollTop = drag.t - (e.clientY - drag.y);
});
stage.addEventListener('pointerup', (e) => {
  drag = null;
  stage.releasePointerCapture(e.pointerId);
  stage.classList.remove('dragging');
});

fit();
</script>
</body>
</html>
