services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arrowmaze
      POSTGRES_PASSWORD: arrowmaze
      POSTGRES_DB: arrowmaze
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrowmaze -d arrowmaze"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  pgdata:
