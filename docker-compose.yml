services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arrowmaze
      POSTGRES_PASSWORD: arrowmaze
      POSTGRES_DB: arrowmaze
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arrowmaze -d arrowmaze"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      # Secreto real: nunca en .env.docker (trackeado). Viene del .env local
      # (gitignored) en la raiz del repo, que Docker Compose autolee para
      # resolver ${...}. Falla rapido y claro si nadie lo definio.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in your local .env file (see .env.example)}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  pgdata:
